[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
match_path = "test/[!f]*"  # Exclude fork tests from default run

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[profile.ci]
verbosity = 3

[rpc_endpoints]
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
